version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: portfolio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Express Backend
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/portfolio?schema=public
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET:-portfolio-admin-secret-change-me}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MAILERSEND_API_KEY: ${MAILERSEND_API_KEY:-}
      MAILERSEND_SENDER_EMAIL: ${MAILERSEND_SENDER_EMAIL:-}
      MAILERSEND_RECIPIENT_EMAIL: ${MAILERSEND_RECIPIENT_EMAIL:-}
    ports:
      - "5001:5001"

  # Next.js Frontend
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
